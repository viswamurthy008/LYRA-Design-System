name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type-check & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `prepare` runs the library build automatically during install.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build library
        run: npm run build

      - name: Build Storybook
        run: npm run build-storybook
